name: Rust Release Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  BUILD_MODE: --release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add musl target (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: rustup target add x86_64-unknown-linux-musl

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cargo build ${{ env.BUILD_MODE }} --target x86_64-unknown-linux-musl
          else
            cargo build ${{ env.BUILD_MODE }}
          fi

      - name: Test Compile
        shell: bash
        run: cargo test ${{ env.BUILD_MODE }} --no-run

      - name: Prepare final binary
        shell: bash
        run: |
          mkdir -p artifacts
          BIN_NAME="${{ github.event.repository.name }}"
          case "${{ matrix.os }}" in
            ubuntu-latest)
              cp "target/x86_64-unknown-linux-musl/release/$BIN_NAME" "artifacts/$BIN_NAME"
              ;;
            windows-latest)
              cp "target/release/$BIN_NAME.exe" "artifacts/$BIN_NAME.exe"
              ;;
            macos-latest)
              cp "target/release/$BIN_NAME" "artifacts/$BIN_NAME"
              ;;
          esac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: artifacts/*